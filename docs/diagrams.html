<h2>3. System Flowchart</h2>
<div class="diagram-box">
<svg viewBox="0 0 700 680" xmlns="http://www.w3.org/2000/svg" width="100%">
  <defs>
    <marker id="fa" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#94a3b8"/>
    </marker>
  </defs>

  <!-- START -->
  <ellipse cx="350" cy="30" rx="70" ry="24" fill="#8b5cf6"/>
  <text x="350" y="36" text-anchor="middle" fill="white" font-weight="bold" font-size="13">START</text>

  <!-- Visit Site -->

  <!-- No → Login -->

  <text x="505" y="168" fill="#94a3b8" font-size="10">No</text>

  <!-- Yes → Upload -->
  <line x1="350" y1="205" x2="350" y2="230" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#fa)"/>
  <text x="360" y="222" fill="#94a3b8" font-size="10">Yes</text>

  <!-- Upload Resume -->
  <rect x="250" y="230" width="200" height="40" rx="8" fill="#1e1b4b" stroke="#06b6d4" stroke-width="1.5"/>

  <line x1="350" y1="270" x2="350" y2="295" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#fa)"/>

  <!-- Valid file? -->
  <polygon points="350,295 450,325 350,355 250,325" fill="#1e1b4b" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="350" y="329" text-anchor="middle" fill="#fcd34d" font-size="11">Valid file?</text>

  <!-- No → error -->
  <line x1="250" y1="325" x2="160" y2="325" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#fa)"/>
  <text x="205" y="318" fill="#94a3b8" font-size="10">No</text>
  <rect x="60" y="305" width="100" height="40" rx="8" fill="#1e1b4b" stroke="#ef4444" stroke-width="1.5"/>
  <text x="110" y="329" text-anchor="middle" fill="#fca5a5" font-size="11">Show Error</text>
  <line x1="110" y1="305" x2="110" y2="260" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="110" y1="260" x2="250" y2="245" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#fa)"/>

  <!-- Yes → Extract -->
  <line x1="350" y1="355" x2="350" y2="380" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#fa)"/>

  <!-- Extract Text -->
  <rect x="220" y="380" width="260" height="40" rx="8" fill="#1e1b4b" stroke="#06b6d4" stroke-width="1.5"/>
  <text x="350" y="405" text-anchor="middle" fill="#e2e8f0" font-size="12">Extract Text (pdfplumber/docx)</text>
  <line x1="350" y1="420" x2="350" y2="445" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#fa)"/>

  <!-- Run Analysis -->
  <rect x="200" y="445" width="300" height="50" rx="8" fill="#1a2744" stroke="#8b5cf6" stroke-width="2"/>
  <text x="350" y="465" text-anchor="middle" fill="#c7d2fe" font-size="12" font-weight="bold">Run Analysis Pipeline</text>
  <text x="350" y="485" text-anchor="middle" fill="#94a3b8" font-size="10">Skills • Experience • Education • Keywords</text>
  <line x1="350" y1="495" x2="350" y2="520" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#fa)"/>

  <!-- Claude Feedback -->
  <rect x="220" y="520" width="260" height="40" rx="8" fill="#1e1b4b" stroke="#f43f5e" stroke-width="1.5"/>
  <text x="350" y="545" text-anchor="middle" fill="#e2e8f0" font-size="12">Generate AI Feedback (Claude)</text>
  <line x1="350" y1="560" x2="350" y2="585" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#fa)"/>

  <!-- Show Result -->
  <rect x="250" y="585" width="200" height="40" rx="8" fill="#1e1b4b" stroke="#10b981" stroke-width="1.5"/>
  <text x="350" y="610" text-anchor="middle" fill="#e2e8f0" font-size="12">Show Result Page</text>
  <line x1="350" y1="625" x2="350" y2="648" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#fa)"/>

  <!-- END -->
  <ellipse cx="350" cy="660" rx="50" ry="20" fill="#10b981"/>
  <text x="350" y="665" text-anchor="middle" fill="white" font-weight="bold" font-size="13">END</text>
</svg>
