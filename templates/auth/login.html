{% extends 'base.html' %}
{% block title %}Login - ResumeAI{% endblock %}

{% block content %}
<div class="auth-page">
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-logo">
                <i class="fas fa-brain"></i>
                <span>Resume<span class="text-accent">AI</span></span>
            </div>
            <h2 class="auth-title">Welcome back</h2>
            <p class="auth-subtitle">Log in to your account</p>

            <form method="POST" action="{{ url_for('auth.login') }}">
                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input type="email" name="email" class="form-control form-control-dark" 
                           placeholder="you@example.com" required autocomplete="email">
                </div>
                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <div class="input-group">
                        <input type="password" name="password" id="passwordInput" 
                               class="form-control form-control-dark" placeholder="••••••••" required>
                        <button class="btn btn-outline-secondary" type="button" onclick="togglePwd()">
                            <i class="fas fa-eye" id="eyeIcon"></i>
                        </button>
                    </div>
                </div>
                <div class="mb-3 form-check">
                    <input type="checkbox" class="form-check-input" name="remember" id="rememberMe">
                    <label class="form-check-label" for="rememberMe">Remember me</label>
                </div>
                <button type="submit" class="btn btn-accent w-100 btn-lg">
                    <i class="fas fa-sign-in-alt me-2"></i>Log In
                </button>
            </form>

            <div class="auth-divider">
                <span>or</span>
            </div>

            <div class="demo-login-box">
                <p class="text-muted small mb-2">Try with demo account:</p>
                <code class="text-accent">demo@resumeai.com / demo1234</code>
            </div>

            <p class="text-center mt-3 text-muted">
                Don't have an account? 
                <a href="{{ url_for('auth.register') }}" class="text-accent">Sign up free</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
function togglePwd() {
    const input = document.getElementById('passwordInput');
    const icon = document.getElementById('eyeIcon');
    if (input.type === 'password') {
        input.type = 'text';
        icon.className = 'fas fa-eye-slash';
    } else {
        input.type = 'password';
        icon.className = 'fas fa-eye';
    }
}
</script>
{% endblock %}
